name: Publish Windows release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  RELEASE_TAG: v1.1.0

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Check whether the release already exists
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (gh release view $env:RELEASE_TAG 2>$null) {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "$env:RELEASE_TAG already exists; no release build is needed."
          }
          else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }
          # A missing release is expected on the first publication. Clear the
          # non-zero exit code left behind by `gh release view`.
          exit 0

      - name: Set up Python
        if: steps.release.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Create build environment
        if: steps.release.outputs.exists != 'true'
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Run release tests
        if: steps.release.outputs.exists != 'true'
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Build Windows application
        if: steps.release.outputs.exists != 'true'
        shell: pwsh
        run: .\build_transparentor.ps1 -Clean

      - name: Prepare versioned executable
        if: steps.release.outputs.exists != 'true'
        shell: pwsh
        run: Copy-Item -LiteralPath "dist\Transparentor.exe" -Destination "dist\Transparentor-1.1.0-Windows.exe"

      - name: Publish v1.1.0
        if: steps.release.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:RELEASE_TAG `
            "dist\Transparentor-1.1.0-Windows.exe" `
            "dist\Transparentor-1.1.0-windows-x64.zip" `
            --target $env:GITHUB_SHA `
            --title "Transparentor 1.1.0" `
            --notes-file "RELEASE_NOTES.md"
