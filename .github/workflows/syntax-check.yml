name: Release smoke checks

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile source
        shell: pwsh
        run: |
          python -c "from pathlib import Path; p = Path('Transparentor.pyw'); compile(p.read_text(encoding='utf-8'), str(p), 'exec'); print('Syntax OK')"
      - name: Install smoke-test dependencies
        run: python -m pip install numpy==2.4.6 Pillow==12.2.0 tkinterdnd2==0.4.4.1
      - name: Run release smoke tests
        run: python -m unittest discover -s tests -v
